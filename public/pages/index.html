<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <title>DSM | Megasena</title>
</head>

<body>
    <main class="page">
        <section class="panel">
            <div>
                <h1>Mega-Sena</h1>
                <p>Consulte o último resultado ou busque por concurso.</p>
            </div>
            <form class="search" id="search-form">
                <label for="concurso-input">Concurso</label>
                <div class="search-row">
                    <input id="concurso-input" name="concurso" inputmode="numeric" placeholder="Ex: 2700" />
                    <button type="submit">Buscar</button>
                </div>
            </form>

            <section class="result" id="result">
            </section>
        </section>
    </main>

    <script src="/assets/js/main.js"></script>
</body>

</html>
